<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Default theme-color; applyTheme updates this to the active theme's --bg. -->
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="description" content="AI-powered personal app platform." />
    <!-- iOS PWA: hides Safari UI chrome when launched from home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent extends the web view UNDER the iOS status bar /
         notch — the shell bar pads by env(safe-area-inset-top), and
         immersive mode (moebius:immersive, .pm/128) relies on it for true
         full-viewport games. iOS reads this at PWA LAUNCH: changing it
         needs the installed PWA fully relaunched from the home screen. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Möbius" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/moebius.png" />
    <!-- Fonts are self-hosted under /vendor/fonts/ (Inter + JetBrains Mono,
         latin subset, woff2). @font-face declarations are in src/index.css.
         Preloading the primary text face (Inter 400) avoids a FOUT on first
         paint without blocking non-Latin weights until they're needed. -->
    <link rel="preload" href="/vendor/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <!-- KaTeX CSS + JS are self-hosted under /vendor/katex@0.17.0/ (built
         into the image by the Dockerfile). The script is deferred so it
         does not block first paint; math.js guards on window.katex before
         calling any render function. -->
    <link rel="stylesheet" href="/vendor/katex@0.17.0/katex.min.css" />
    <script defer src="/vendor/katex@0.17.0/katex.min.js"></script>
    <title>Möbius</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Theme-as-data: the server serializes the effective theme
         ({css,bg,mode}) into this slot on every request. The pre-paint
         script below reads it (falling back to persisted localStorage,
         then the dark default) and paints --bg / data-theme / color-scheme
         BEFORE first paint, so there is no wrong-mode flash. The full
         applyTheme (fonts, meta, persistence) runs once the module loads.
         The slot is empty in the SW-cached (offline) index.html, so the
         pre-paint script falls through to localStorage there. -->
    <script type="application/json" id="__mobius-theme__"></script>
    <script>(function () {
  try {
    var HEX = /^#[0-9a-fA-F]{3,8}$/;
    var root = document.documentElement;
    function infer(bg) {
      if (!bg || !HEX.test(bg)) return null;
      var raw = bg.slice(1);
      var x = raw.length === 3 || raw.length === 4
        ? raw.slice(0, 3).replace(/(.)/g, '$1$1')
        : raw.slice(0, 6);
      var r = parseInt(x.slice(0, 2), 16);
      var g = parseInt(x.slice(2, 4), 16);
      var b = parseInt(x.slice(4, 6), 16);
      if (r !== r || g !== g || b !== b) return null;
      return (r + g + b) / 3 < 128 ? 'dark' : 'light';
    }
    var css, bg, mode;
    try {
      var slot = document.getElementById('__mobius-theme__');
      var txt = slot && slot.textContent && slot.textContent.trim();
      if (txt) {
        var d = JSON.parse(txt);
        if (typeof d.css === 'string') css = d.css;
        if (d.bg && HEX.test(d.bg)) bg = d.bg;
        mode = d.mode || infer(bg);
      }
    } catch (e) {}
    if (!bg) {
      try {
        var raw = localStorage.getItem('mobius-theme');
        if (raw) {
          var p = JSON.parse(raw);
          if (p.bg && HEX.test(p.bg)) { bg = p.bg; mode = mode || p.mode || infer(p.bg); }
        }
      } catch (e) {}
    }
    if (!bg) {
      try {
        var legacy = localStorage.getItem('mobius-theme-bg');
        if (legacy && HEX.test(legacy)) { bg = legacy; mode = mode || infer(legacy); }
      } catch (e) {}
    }
    if (!bg) bg = '#0d0d0d';
    if (!mode) mode = 'dark';
    if (css) {
      // Match applyTheme.js: pull CSS @import-url rules out of the body and
      // re-inject only the http(s) ones as <link data-theme-font> (a
      // javascript:/data: URL must not become active CSS), so the pre-painted
      // <style> never carries a raw rule the live applier would re-strip.
      var fontUrls = [];
      // Cover all four @import-rule forms (quoted url(), bare url(), and
      // no-url() "X"/'X') so the http(s) allowlist below can't be bypassed by
      // a syntax the quoted-url-only regex didn't see. Backslashes are DOUBLED
      // here because this is a template literal — the evaluated string carries
      // single backslashes (see applyTheme.prepaint.test.js byte-equality).
      css = css.replace(
        /@import\s+(?:url\(\s*(?:"([^"]*)"|'([^']*)'|([^"'()\s]+))\s*\)|"([^"]*)"|'([^']*)')\s*;[^\S\n]*\n?/g,
        function (m, u1, u2, u3, q1, q2) {
          fontUrls.push(u1 !== undefined ? u1 : u2 !== undefined ? u2 : u3 !== undefined ? u3 : q1 !== undefined ? q1 : q2);
          return '';
        }
      );
      for (var i = 0; i < fontUrls.length; i++) {
        if (/^https?:\/\//i.test(fontUrls[i])) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = fontUrls[i];
          link.setAttribute('data-theme-font', '1');
          document.head.appendChild(link);
        }
      }
      var el = document.getElementById('mobius-theme');
      if (!el) {
        el = document.createElement('style');
        el.id = 'mobius-theme';
        document.head.appendChild(el);
      }
      el.textContent = css;
    }
    root.style.setProperty('--bg', bg);
    root.setAttribute('data-theme', mode);
    var m = document.querySelector('meta[name="theme-color"]');
    if (m) m.setAttribute('content', bg);
    root.style.colorScheme = mode;
    // Persist (TOP-LEVEL SHELL ONLY) so a frame's pre-paint can read the
    // correct {bg,mode}. The same-origin app-frame shares this localStorage but
    // has an EMPTY slot, so it must NOT write — else it clobbers the owner's
    // real theme with the dark default and the shell re-reads it (drawer bleed).
    try {
      if (window.parent === window) {
        localStorage.setItem('mobius-theme', JSON.stringify({ bg: bg, mode: mode }));
        localStorage.setItem('mobius-theme-bg', bg);
      }
    } catch (e) {}
  } catch (e) {}
})();</script>
  </head>
  <!-- Theme bg comes from var(--bg), set by the pre-paint script above. -->
  <body style="margin:0;background:var(--bg,#0d0d0d)">
    <!-- Theme bg comes from var(--bg), set by the pre-paint script above. -->
    <div id="splash" style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:var(--bg,#0d0d0d);z-index:9999;transition:opacity .3s ease;contain:strict">
      <img src="/moebius.png" width="56" height="56" alt="" style="opacity:.4;will-change:opacity" />
    </div>
    <div id="root"></div>
    <script>
      // Hide splash immediately on refresh (user already logged in).
      if (localStorage.getItem('token')) {
        var s = document.getElementById('splash')
        if (s) s.remove()
      }
      // Prevent browser from scrolling to top on refresh.
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual'
      }
      // If the shell JS fails to load within 8s, surface a recovery link so the
      // user can restore the UI without knowing the server address.
      setTimeout(function() {
        if (!document.getElementById('root').hasChildNodes()) {
          var d = document.createElement('div')
          d.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99999;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 20px;font-family:system-ui,sans-serif;font-size:13px;color:#94a3b8;text-align:center;white-space:nowrap'
          d.innerHTML = 'Shell failed to load. <a href="/recover" style="color:#a78bfa;text-decoration:none;font-weight:500">Open recovery page \u2192</a>'
          document.body.appendChild(d)
        }
      }, 8000)
    </script>
    <script>
      // `updateViaCache: 'none'` tells the browser to bypass its HTTP
      // cache when fetching sw.js itself during update checks. Without
      // this, the browser caches sw.js (we set Cache-Control: no-cache
      // server-side but a previously-cached SW response still applies
      // until the browser revalidates) and the OLD sw.js keeps being
      // served on reload — users get stuck on a stale precached bundle
      // and need to manually clear cache. With this set, every reload
      // triggers a fresh sw.js fetch from network so deploys take
      // effect immediately. Belt-and-suspenders with the server-side
      // header in main.py.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
        // Watchdog: if the registration we just installed sees a NEW
        // SW available within the next 8s, refresh once it activates.
        // Pairs with the SW's own skipWaiting() so users on stale
        // precached bundles get a soft auto-reload without having
        // to clear cache by hand. Single-shot via session flag so
        // we don't loop on persistent update-pending states.
        navigator.serviceWorker.ready.then(reg => {
          reg.addEventListener('updatefound', () => {
            const next = reg.installing
            if (!next) return
            next.addEventListener('statechange', () => {
              if (next.state === 'activated'
                  && navigator.serviceWorker.controller
                  && !sessionStorage.getItem('sw-auto-reloaded')) {
                sessionStorage.setItem('sw-auto-reloaded', '1')
                window.location.reload()
              }
            })
          })
          // Poll for a new SW whenever the PWA returns to the foreground.
          // The explicit `shell_rebuilt` SSE event (Shell.jsx) handles a
          // PWA with a LIVE connection, but a backgrounded/reopened install
          // may have dropped its EventSource and would otherwise keep
          // running the old shell until a hard reload. reg.update() re-fetches
          // sw.js; if the deploy shipped a new one, the `updatefound` watchdog
          // above takes over and soft-reloads once it activates. Cheap (one
          // conditional GET, server sends 304 when unchanged) and only on
          // visible, so it's not a polling loop.
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
              reg.update().catch(() => {})
            }
          })
        }).catch(() => {})
      }
      // Request persistent storage so cached app modules and offline
      // state aren't evicted under storage pressure. Best-effort —
      // browser may deny without prompting.
      if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persisted().then(p => p || navigator.storage.persist()).catch(() => {})
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
