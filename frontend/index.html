<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Server replaces this with the active theme's --bg color on every request. -->
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="description" content="AI-powered personal app platform." />
    <!-- iOS PWA: hides Safari UI chrome when launched from home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Möbius" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/moebius.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <title>Möbius</title>
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <!-- Server replaces background:#0d0d0d with the active theme color. -->
  <body style="margin:0;background:#0d0d0d">
    <!-- Server replaces background:#0d0d0d with the active theme's --bg color. -->
    <div id="splash" style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#0d0d0d;z-index:9999;transition:opacity .3s ease;contain:strict">
      <img src="/moebius.png" width="56" height="56" alt="" style="opacity:.4;will-change:opacity" />
    </div>
    <div id="root"></div>
    <script>
      // Apply the persisted theme background before first paint so a
      // cold-offline shell boot (served from the SW's cached, NOT
      // theme-injected, index.html) matches the owner's theme instead
      // of flashing the default. useTheme writes this key on every
      // successful theme load. Best-effort; default stays if absent.
      try {
        var __bg = localStorage.getItem('mobius-theme-bg')
        if (__bg) {
          document.documentElement.style.setProperty('--bg', __bg)
          document.body.style.background = __bg
          var sp = document.getElementById('splash')
          if (sp) sp.style.background = __bg
        }
      } catch (e) {}
      // Hide splash immediately on refresh (user already logged in).
      if (localStorage.getItem('token')) {
        var s = document.getElementById('splash')
        if (s) s.remove()
      }
      // Prevent browser from scrolling to top on refresh.
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual'
      }
      // If the shell JS fails to load within 8s, surface a recovery link so the
      // user can restore the UI without knowing the server address.
      setTimeout(function() {
        if (!document.getElementById('root').hasChildNodes()) {
          var d = document.createElement('div')
          d.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99999;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 20px;font-family:system-ui,sans-serif;font-size:13px;color:#94a3b8;text-align:center;white-space:nowrap'
          d.innerHTML = 'Shell failed to load. <a href="/recover" style="color:#a78bfa;text-decoration:none;font-weight:500">Open recovery page \u2192</a>'
          document.body.appendChild(d)
        }
      }, 8000)
    </script>
    <script>
      // `updateViaCache: 'none'` tells the browser to bypass its HTTP
      // cache when fetching sw.js itself during update checks. Without
      // this, the browser caches sw.js (we set Cache-Control: no-cache
      // server-side but a previously-cached SW response still applies
      // until the browser revalidates) and the OLD sw.js keeps being
      // served on reload — users get stuck on a stale precached bundle
      // and need to manually clear cache. With this set, every reload
      // triggers a fresh sw.js fetch from network so deploys take
      // effect immediately. Belt-and-suspenders with the server-side
      // header in main.py.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
        // Watchdog: if the registration we just installed sees a NEW
        // SW available within the next 8s, refresh once it activates.
        // Pairs with the SW's own skipWaiting() so users on stale
        // precached bundles get a soft auto-reload without having
        // to clear cache by hand. Single-shot via session flag so
        // we don't loop on persistent update-pending states.
        navigator.serviceWorker.ready.then(reg => {
          reg.addEventListener('updatefound', () => {
            const next = reg.installing
            if (!next) return
            next.addEventListener('statechange', () => {
              if (next.state === 'activated'
                  && navigator.serviceWorker.controller
                  && !sessionStorage.getItem('sw-auto-reloaded')) {
                sessionStorage.setItem('sw-auto-reloaded', '1')
                window.location.reload()
              }
            })
          })
        }).catch(() => {})
      }
      // Request persistent storage so cached app modules and offline
      // state aren't evicted under storage pressure. Best-effort —
      // browser may deny without prompting.
      if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persisted().then(p => p || navigator.storage.persist()).catch(() => {})
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
