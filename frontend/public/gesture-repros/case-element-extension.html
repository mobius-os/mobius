<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="color-scheme" content="dark">
  <link rel="manifest" href="./manifest-element-extension.json">
  <title>Element Extension Cover</title>
  <style>
    :root { color-scheme: dark; background: #0d0d0d; font-family: system-ui, sans-serif; }
    html, body { width: 100%; min-height: 100%; background: #0d0d0d; }
    body { margin: 0; color: white; }
    body::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: -32px;
      height: calc(env(safe-area-inset-bottom, 0px) + 32px);
      background: #0d0d0d;
      pointer-events: none;
    }
    .page { min-height: 100svh; display: grid; align-content: end; padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px)); background: #0d0d0d; }
    .probe { padding: 12px; background: #1f2937; border: 1px solid #374151; font: 13px/1.4 ui-monospace, monospace; }
  </style>
</head>
<body>
  <main class="page">
    <div class="probe">Fixed pseudo-element extends 32px below bottom and paints #0d0d0d. This isolates the element-paints-the-area theory.</div>
  </main>
  <script src="./metrics.js"></script>
</body>
</html>
