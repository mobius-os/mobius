<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="manifest" href="./manifest-no-scheme.json">
  <title>No Scheme Cover</title>
  <style>
    body { margin: 0; min-height: 100svh; background: #0d0d0d; color: white; font-family: system-ui, sans-serif; }
    .page { min-height: 100svh; display: grid; align-content: end; padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px)); background: #0d0d0d; }
    .probe { padding: 12px; background: #1f2937; border: 1px solid #374151; font: 13px/1.4 ui-monospace, monospace; }
  </style>
</head>
<body>
  <main class="page">
    <div class="probe">No color-scheme meta/CSS; viewport-fit=cover; body background #0d0d0d; no bottom element.</div>
  </main>
  <script src="./metrics.js"></script>
</body>
</html>
