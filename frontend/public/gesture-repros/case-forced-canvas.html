<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="color-scheme" content="dark">
  <link rel="manifest" href="./manifest-forced-canvas.json">
  <title>Forced Canvas Cover</title>
  <style>
    :root { color-scheme: dark; background: #0d0d0d; font-family: system-ui, sans-serif; }
    html, body, #root { width: 100%; min-height: 100%; background: #0d0d0d !important; }
    body { margin: 0; color: white; }
    #root { min-height: 100svh; display: grid; align-content: end; padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px)); }
    .probe { padding: 12px; background: #1f2937; border: 1px solid #374151; font: 13px/1.4 ui-monospace, monospace; }
  </style>
</head>
<body>
  <main id="root">
    <div class="probe">Forced html/body/#root background #0d0d0d; color-scheme: dark; viewport-fit=cover; no element extends below bottom.</div>
  </main>
  <script src="./metrics.js"></script>
</body>
</html>
