<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover makes the iframe's layout viewport extend UNDER the
       notch/punch-hole so an immersive app's background paints full-bleed (the
       safe-rect-only default left a strip of shell colour above the app), and
       it makes env(safe-area-inset-*) resolve to the real device insets inside
       this document. Apps may now pad controls with env() directly OR with the
       shell-forwarded --mobius-safe-* vars (which still cover the case where an
       app wants insets only while immersive). Folded into _frame_etag via
       sha256(app-frame.html), so installed PWAs revalidate the frame on the
       next open and purge the stale safe-rect-only frame from the SW cache. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="referrer" content="no-referrer">
  <script type="importmap">
  {
    "imports": {
      "react": "/vendor/react@19.2.6/react.mjs",
      "react/jsx-runtime": "/vendor/react@19.2.6/jsx-runtime.mjs",
      "react-dom": "/vendor/react@19.2.6/react-dom.mjs",
      "react-dom/client": "/vendor/react@19.2.6/client.mjs",
      "recharts": "/vendor/recharts@2.15.4/recharts.mjs",
      "date-fns": "/vendor/date-fns@4.3.0/date-fns.mjs",
      "three": "/vendor/three@0.184.0/three.module.js",
      "three/addons/": "/vendor/three@0.184.0/addons/",
      "pdfjs-dist": "/vendor/pdfjs/pdf.mjs",
      "codemirror": "/vendor/codemirror@6/codemirror.mjs",
      "@codemirror/state": "/vendor/codemirror@6/state.mjs",
      "@codemirror/view": "/vendor/codemirror@6/view.mjs",
      "@codemirror/commands": "/vendor/codemirror@6/commands.mjs",
      "@codemirror/language": "/vendor/codemirror@6/language.mjs",
      "@codemirror/lang-markdown": "/vendor/codemirror@6/lang-markdown.mjs",
      "@lezer/highlight": "/vendor/codemirror@6/lezer-highlight.mjs",
      "katex": "/vendor/katex@0.17.0/katex.mjs"
    }
  }
  </script>
  <style>
    /* Fallback defaults — overridden by server-injected theme from theme.py. */
    :root {
      --bg: #0c0f14; --surface: #14181f; --surface2: #1a1f28;
      --border: #252b36; --border-light: #1c2029;
      --text: #d4d4d8; --muted: #52525b;
      --accent: #a78bfa; --accent-hover: #c4b5fd;
      --accent-dim: rgba(167, 139, 250, 0.1);
      --danger: #f87171; --green: #6ee7b7;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      /* Immersive safe-area insets, forwarded from the shell via
         moebius:frame-insets (env(safe-area-inset-*) reads 0 inside this
         sandboxed iframe). Default 0 so apps can reference them before the
         first message and while windowed; non-zero only while immersive. */
      --mobius-safe-top: 0px; --mobius-safe-right: 0px;
      --mobius-safe-bottom: 0px; --mobius-safe-left: 0px;
    }
    /* No grey/blue tap-flash on any interactive element across mini-apps (mobile). */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    /* Native-app feel: no text-selection bounding box over buttons / labels /
       UI chrome when tapped or long-pressed. Re-enabled on the things you
       genuinely select into: form fields and contenteditable (CodeMirror's
       editor surface is contenteditable, so editors stay selectable). The
       News report renders in its own iframe, so its body text is unaffected. */
    body { -webkit-user-select: none; user-select: none; }
    input, textarea, [contenteditable], [contenteditable] * { -webkit-user-select: text; user-select: text; }
    /* Prevent iOS Safari page-level pinch-zoom. user-scalable=no in the
       viewport meta is ignored by iOS Safari; touch-action: pan-x pan-y
       on html/body is the CSS-level lock. Mini-apps that need their own
       pinch (e.g. image lightboxes) set touch-action: none on their own
       interactive surface to override this. */
    html, body { touch-action: pan-x pan-y; }
    /* Always-hidden scrollbars in mini-app frames — matches the shell's
       global default after the on-scroll reveal mechanism was retired
       (owner preference: scrollbars never show, in any surface). */
    html, body, * { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }
    #error-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 32px 24px;
      text-align: center;
      gap: 16px;
    }
    #error-panel.visible { display: flex; }
    .error-icon { font-size: 28px; opacity: 0.5; }
    .error-title { font-size: 15px; font-weight: 600; color: var(--danger); }
    .error-detail {
      max-width: 560px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }
    .error-actions { display: flex; gap: 10px; margin-top: 4px; }
    .error-btn {
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
    }
    .error-btn--reload { background: var(--surface2); color: var(--text); }
    .error-btn--reload:hover { background: var(--border); }
    .error-btn--report { background: var(--accent); color: #fff; }
    .error-btn--report:hover { background: var(--accent-hover); }
    .error-btn--reported { background: var(--surface2); color: var(--green); pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="error-panel">
    <div class="error-icon">!</div>
    <div class="error-title" id="error-title">Something went wrong</div>
    <div class="error-detail" id="error-detail"></div>
    <div class="error-actions">
      <button class="error-btn error-btn--reload" onclick="location.reload()">Reload app</button>
      <button class="error-btn error-btn--report" id="report-btn" onclick="reportError()">Tell agent to fix</button>
    </div>
  </div>

  <script>
    // Populated by server-side injection in get_frame() — do not rename.
    var _FRAME_APP_ID = 'unknown'
    var _FRAME_CHAT_ID = ''

    var capturedError = ''
    var capturedErrorOnce = false  // only the first error is reported (root cause)

    function showErr(title, detail) {
      if (!capturedErrorOnce) { capturedError = detail; capturedErrorOnce = true; }
      document.getElementById('error-title').textContent = title
      document.getElementById('error-detail').textContent = detail
      document.getElementById('error-panel').classList.add('visible')
      document.getElementById('root').style.display = 'none'
      // Tell the parent the frame reached a terminal error so it hides
      // its loading overlay. Without this, a load failure BEFORE
      // 'frame-mounted' (bad import, no token, no default export, init
      // timeout) leaves AppCanvas's opaque spinner covering this error
      // panel forever — a dead spinner the user can't get past. Posting
      // after mount (a runtime/unhandledrejection error) is harmless:
      // the parent already hid the overlay and the handler is idempotent.
      window.parent.postMessage(
        { type: 'moebius:frame-error', appId: _FRAME_APP_ID },
        window.location.origin
      )
    }

    function reportError() {
      window.parent.postMessage({
        type: 'moebius:app-error',
        appId: _FRAME_APP_ID,
        chatId: _FRAME_CHAT_ID,
        error: capturedError
      }, window.location.origin)
      var btn = document.getElementById('report-btn')
      btn.textContent = 'Reported'
      btn.className = 'error-btn error-btn--reported'
    }

    // Post-mount runtime errors must NOT blank a running app. The frame's
    // error panel hides #root, which is correct for a LOAD failure (nothing
    // useful is on screen yet) but wrong once the app is mounted and
    // interactive: a transient unhandled rejection — e.g. an offline
    // fetch/storage save failing at Snake's game-over — would otherwise
    // destroy the whole app to a blank/error screen. So once mounted we
    // keep the app on screen and only LOG the error; pre-mount errors
    // still surface the panel. `window.__frameMounted` is set by a
    // passive effect after React commits the first render (see
    // MountSignal in the module script below) — NOT right after
    // createRoot().render(), because render() only schedules the first
    // render and a component that throws during it reports the error
    // asynchronously, after render() returns.
    function handleFrameError(title, detail) {
      if (window.__frameMounted) {
        // The browser also logs the uncaught error natively; this line
        // records why no error panel replaced the working UI.
        console.error('[moebius-frame] post-mount ' + title +
          ' (app left on screen): ' + detail)
        return
      }
      showErr(title, detail)
    }
    window.addEventListener('error', function(e) {
      handleFrameError('Runtime error', e.error ? e.error.stack || e.message : e.message)
    })
    window.addEventListener('unhandledrejection', function(e) {
      handleFrameError('Unhandled error', e.reason ? (e.reason.stack || String(e.reason)) : String(e))
    })
  </script>

  <script type="module">
    // Token-free init protocol (since 2026-04-27).
    //
    // This file is the RECEIVER side. The parent SENDER side lives
    // in `frontend/src/components/AppCanvas/AppCanvas.jsx` — its
    // top-of-file comment block has the authoritative payload
    // shapes. Keep both in sync when changing the protocol.
    //
    // The frame HTML is cacheable across sessions because the
    // auth token and theme are NOT baked into the body. Instead the
    // parent shell injects them via postMessage after the iframe
    // loads. Sequence:
    //
    //   1. iframe finishes loading, this script runs (listener
    //      registered before iframe.onLoad fires in the parent).
    //   2. parent (AppCanvas.jsx) posts
    //      {type:'moebius:frame-init', token, themeCss, bg} on
    //      its iframe.onLoad handler.
    //   3. iframe applies theme, imports module with token, mounts.
    //   4. iframe posts {type:'moebius:frame-mounted', appId} —
    //      parent hides the loading overlay.
    //   4b. on a terminal load failure instead of (4), iframe posts
    //      {type:'moebius:frame-error', appId} so the parent hides the
    //      overlay and this frame's error panel becomes visible.
    //   5. parent may later post {type:'moebius:frame-theme', ...}
    //      to update theme without reloading the iframe.
    //
    // Origin check: the iframe rejects any message whose origin
    // isn't window.location.origin (same-origin with the shell).
    // An attacker embedding this frame on their own page can read
    // the ready event but cannot inject a token — their reply has
    // the wrong origin.
    import { createRoot } from 'react-dom/client';
    import { createElement, Fragment, useEffect } from 'react';

    let initialized = false;

    // Flips the post-mount error guard (handleFrameError above). Rendered
    // as the FIRST sibling of the app component, so its passive effect is
    // the first thing React runs after committing the initial render —
    // i.e. the app's DOM is actually on screen. A component that throws
    // DURING its first render aborts the commit, this effect never runs,
    // and the error panel still shows (the pre-mount path). A throw in
    // the app's own mount effects happens with committed, visible DOM, so
    // counting it as post-mount (suppressed + logged) is correct.
    function MountSignal() {
      useEffect(() => { window.__frameMounted = true; }, []);
      return null;
    }

    // Immersive safe-area passthrough. env(safe-area-inset-*) reads 0 inside
    // this sandboxed iframe (only the top-level document resolves
    // viewport-fit insets), so the parent shell reads the device's real
    // insets off a probe element and posts them. We expose them as
    // --mobius-safe-{top,right,bottom,left} on :root; an immersive app pads
    // with these instead of env(). The parent posts zeros whenever the app is
    // NOT immersive (its chrome owns the inset padding then), so apps can
    // unconditionally reference the vars and get 0 when windowed. Documented
    // for app authors in the building-apps skill.
    function applyInsets(insets) {
      if (!insets || typeof insets !== 'object') return;
      var root = document.documentElement.style;
      root.setProperty('--mobius-safe-top', insets.top || '0px');
      root.setProperty('--mobius-safe-right', insets.right || '0px');
      root.setProperty('--mobius-safe-bottom', insets.bottom || '0px');
      root.setProperty('--mobius-safe-left', insets.left || '0px');
    }

    function applyTheme(css, bg) {
      if (typeof css === 'string' && css.length) {
        let el = document.getElementById('moebius-theme');
        if (!el) {
          el = document.createElement('style');
          el.id = 'moebius-theme';
          document.head.appendChild(el);
        }
        el.textContent = css;
      }
      if (typeof bg === 'string' && bg.length) {
        document.body.style.background = bg;
      }
    }

    // Report uncaught APP errors to the activity log so the nightly Dreaming
    // digest sees them. These fire in THIS iframe's window, not the shell's,
    // so the shell's errorLog can't catch them. POSTs with the app token ->
    // app_error attributed to this app_id. Client-side debounce mirrors the
    // server's so a render loop can't storm the network.
    let _reportToken = null;
    const _reportSeen = new Map();
    function reportAppError(where, message, stack) {
      if (!_reportToken || !message) return;
      const key = String(message).slice(0, 200);
      const now = Date.now();
      const last = _reportSeen.get(key);
      if (last && now - last < 60000) return;
      _reportSeen.set(key, now);
      try {
        fetch('/api/client-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _reportToken },
          body: JSON.stringify({
            message: String(message).slice(0, 2000),
            where: where,
            stack: stack ? String(stack).slice(0, 8000) : undefined,
            url: location.href,
          }),
          keepalive: true,
        }).catch(function () {});
      } catch (e) {}
    }
    window.addEventListener('error', function (e) {
      if (!e.error && !e.message) return;
      reportAppError('app:window.onerror', e.message, e.error && e.error.stack);
    });
    window.addEventListener('unhandledrejection', function (e) {
      const r = e.reason;
      reportAppError('app:unhandledrejection', (r && r.message) || String(r), r && r.stack);
    });

    async function loadModule(token) {
      if (!token) {
        showErr('Configuration error', 'No token received from parent.');
        return;
      }
      _reportToken = token;
      try {
        // Expose window.mobius BEFORE importing/rendering the app, so the
        // component sees it on mount — mirrors the standalone host
        // (routes/standalone.py). Until this landed the runtime was
        // standalone-only and in-shell apps fell back to plainFetch
        // against /api/storage with no offline queue and no
        // window.mobius.chat(). getToken returns the current frame token
        // (refreshed when the parent re-inits). The import is best-effort:
        // a runtime fetch failure must not block the app from rendering.
        try {
          const rt = await import('/mobius-runtime.js');
          rt.init({ appId: _FRAME_APP_ID, getToken: async () => token });
        } catch (e) {}
        const frameVersion = new URLSearchParams(window.location.search).get('v') || '0';
        // &v=frameVersion is REQUIRED as the SW offline cache-buster: the server
        // /module route ignores v (its ETag keys on app.updated_at), but the SW
        // offline handler keeps v in its cache key (it strips token, _ and install but keeps v), so
        // an app update changes the key and forces a fresh fetch.
        const moduleUrl = (retry) => {
          // `_=<retry>` is the per-attempt cache-buster. A failed dynamic
          // import() (or a failed module response) is cached by Chromium per
          // exact URL, so re-importing the SAME url after a transient network
          // blip resolves to the cached failure with no new fetch — the retry
          // below would be a no-op. A fresh `_` each attempt makes the URL
          // distinct so the browser actually re-fetches. The server /module
          // route reads only `token` from the query (ETag keys on
          // app.updated_at), so it ignores `_`; and the SW offline handler
          // already STRIPS `_` from its cache key (appCodeHandler), so the
          // buster never poisons the offline cache. retry 0 = first attempt
          // (no buster), so the cold-start URL is unchanged.
          const base = `/api/apps/${_FRAME_APP_ID}/module?token=${encodeURIComponent(token)}&v=${encodeURIComponent(frameVersion)}`;
          return retry ? `${base}&_=${retry}` : base;
        };
        const url = moduleUrl(0);
        // Dynamic import() can't set request headers, so the token is a query
        // param. An expired or revoked token causes the server to 401, which the
        // browser surfaces as a network-error on import() (CORS/opaque failure),
        // not as an HTTP status. We detect auth failures by probing the same URL
        // with fetch() first (can read the status) when import throws. If the
        // probe says 401/403 we tell the parent to refresh the token rather than
        // showing a permanent error panel, preserving the app's in-session state.
        // Long enough for a woken radio to re-associate; short enough that the
        // parent's loading overlay (still up — we haven't posted frame-mounted
        // or frame-error yet) reads as a slow load, not a hang.
        const IMPORT_RETRY_DELAY_MS = 800;
        let mod;
        try {
          mod = await import(url);
        } catch (importErr) {
          // Probe whether the failure is auth-related (401/403). The probe must
          // be a regular fetch because dynamic import() cannot expose the status.
          // We fire it only after the import fails so cold-start performance is
          // unchanged (the common case never probes).
          let isAuthError = false;
          try {
            const probe = await fetch(url, { method: 'HEAD', cache: 'no-store' });
            isAuthError = probe.status === 401 || probe.status === 403;
          } catch (_) { /* network offline — not an auth error */ }
          if (isAuthError) {
            // Tell the parent shell the token is expired. AppCanvas listens
            // for this, invalidates the app-token query, waits for a fresh token,
            // and re-sends moebius:frame-init with the new value. The initialized
            // flag is reset here so the listener will accept the re-init.
            initialized = false;
            window.parent.postMessage(
              { type: 'moebius:token-expired', appId: _FRAME_APP_ID },
              window.location.origin
            );
            return;  // do NOT show the error panel — the re-init will retry
          }
          // Mobile networks routinely drop the first fetch after device
          // wake, and without a retry one transient blip becomes a
          // permanent "Failed to load app" panel for every app. Network-
          // class import failures surface as TypeError ("Failed to fetch
          // dynamically imported module"); anything else (SyntaxError in
          // the module, a throwing module body) is deterministic, so
          // retrying would only repeat the failure. ONE retry, structurally
          // bounded (no loop), pre-mount only — `window.__frameMounted`
          // stays false on every load-failure path, so the guard is
          // belt-and-braces against a future caller re-running loadModule
          // on a live app, where a second import would double-render.
          if (!(importErr instanceof TypeError) || window.__frameMounted) {
            throw importErr;
          }
          await new Promise((r) => setTimeout(r, IMPORT_RETRY_DELAY_MS));
          // Cache-bust the retry (moduleUrl(1)) so Chromium re-fetches rather
          // than resolving the cached import() failure for the original url.
          // A second failure falls through to showErr.
          mod = await import(moduleUrl(1));
        }
        const Component = mod.default;
        if (!Component) {
          showErr('Module error', 'The app module has no default export.');
          return;
        }
        createRoot(document.getElementById('root')).render(
          createElement(Fragment, null,
            createElement(MountSignal),
            createElement(Component, { appId: _FRAME_APP_ID, token })
          )
        );
        // Tell the parent we've kicked off the React render so it
        // can hide the loading overlay. iframe.onLoad alone fires
        // BEFORE this point (it's the document's load event, not the
        // app's mount), so on a cold module fetch the parent would
        // hide the spinner while the iframe is still blank.
        window.parent.postMessage(
          { type: 'moebius:frame-mounted', appId: _FRAME_APP_ID },
          window.location.origin
        );
      } catch (err) {
        showErr('Failed to load app', err.stack || err.message);
      }
    }

    window.addEventListener('message', (e) => {
      if (e.origin !== window.location.origin) return;
      const msg = e.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'moebius:frame-theme') {
        applyTheme(msg.themeCss, msg.bg);
        return;
      }
      if (msg.type === 'moebius:frame-insets') {
        applyInsets(msg.insets);
        return;
      }
      if (msg.type === 'moebius:frame-init' && !initialized) {
        initialized = true;
        applyTheme(msg.themeCss, msg.bg);
        loadModule(msg.token);
      }
    });

    // No ready/retry handshake. The parent (AppCanvas) drives init
    // off the iframe's `onLoad` event, which by spec fires AFTER all
    // module scripts in this document have executed and registered
    // their message listeners. By then this listener is guaranteed
    // to be live, so a single postMessage from the parent reaches
    // it without a race. If we never get init within 10s the iframe
    // was opened standalone (not inside Möbius) — show an error.
    setTimeout(() => {
      if (!initialized) {
        showErr('Loading timeout', 'No init message from parent shell.');
      }
    }, 10000);
  </script>
</body>
</html>
