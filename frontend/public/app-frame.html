  <div id="error-panel">
    <div class="error-icon">!</div>
    <div class="error-title" id="error-title">Something went wrong</div>
    <div class="error-detail" id="error-detail"></div>
    <div class="error-actions">
      <button class="error-btn error-btn--reload" onclick="location.reload()">Reload app</button>
      <button class="error-btn error-btn--report" id="report-btn" onclick="reportError()">Report to agent</button>

  <script>

    var _FRAME_APP_ID = 'unknown'
    var _FRAME_CHAT_ID = ''

    var capturedError = ''
    var capturedErrorOnce = false  // only the first error is reported (root cause)

    function redactErrorCredentials(detail) {
      return String(detail || '').replace(
        /([?&]token=)[^&\s"'<>]+/gi,
        '$1[redacted]'
      )
    }

    function showErr(title, detail) {
      detail = redactErrorCredentials(detail)
      if (!capturedErrorOnce) { capturedError = detail; capturedErrorOnce = true; }
      document.getElementById('error-title').textContent = title
      document.getElementById('error-detail').textContent = detail
      document.getElementById('error-panel').classList.add('visible')
      document.getElementById('root').style.display = 'none'
      // Tell the parent the frame reached a terminal error so it hides
      // its loading overlay. Without this, a load failure BEFORE
      // 'frame-mounted' (bad import, no token, no default export, init
      // timeout) leaves AppCanvas's opaque spinner covering this error
      // panel forever — a dead spinner the user can't get past. Posting
      // after mount (a runtime/unhandledrejection error) is harmless:
      // the parent already hid the overlay and the handler is idempotent.
      window.parent.postMessage(
        { type: 'moebius:frame-error', appId: _FRAME_APP_ID },
        window.location.origin
      )
    }

    function reportError() {
      window.parent.postMessage({
        type: 'moebius:app-error',
        appId: _FRAME_APP_ID,
        chatId: _FRAME_CHAT_ID,
        error: capturedError
      }, window.location.origin)
      var btn = document.getElementById('report-btn')
      btn.textContent = 'Reported'
      btn.className = 'error-btn error-btn--reported'
    }

    // Post-mount runtime errors must NOT blank a running app. The frame's
    // error panel hides #root, which is correct for a LOAD failure (nothing
    // useful is on screen yet) but wrong once the app is mounted and
    // interactive: a transient unhandled rejection — e.g. an offline
    // fetch/storage save failing at Snake's game-over — would otherwise
    // destroy the whole app to a blank/error screen. So once mounted we
    // keep the app on screen and only LOG the error; pre-mount errors
    // still surface the panel. `window.__frameMounted` is set by a
    // passive effect after React commits the first render (see
    // MountSignal in the module script below) — NOT right after
    // createRoot().render(), because render() only schedules the first
    // render and a component that throws during it reports the error
    // asynchronously, after render() returns.
    function handleFrameError(title, detail) {
      if (window.__frameMounted) {

        // records why no error panel replaced the working UI.
        console.error('[moebius-frame] post-mount ' + title +

      handleFrameError('Unhandled error', e.reason ? (e.reason.stack || String(e.reason)) : String(e))

    // Scroll owners involved in the latest direct gesture. Remembering the
    // composed path lets us stop momentum in an app-owned overflow scroller as
    // well as the document scroller, without walking every node when the drawer
    // opens. Nested third-party frames stay covered by the outer iframe guard.
    const gestureScrollers = new Set();

    // A module request has two independent failure modes, and one deadline
    // cannot measure both. LIVENESS: the parent never takes the request at all
    // — it could not attribute this frame to a mounted version (AppCanvas
    // returns silently on `srcVersion == null`), or the frame is detached. That
    // resolves in milliseconds or never. TRANSFER: the parent took the request
    // and is streaming a multi-megabyte authenticated bundle back, whose
    // duration belongs to the network, not the shell.
    //
    // A single 5s budget over both charged slow downloads with the parent's
    // crime: a cold-cache open of a 1-4MB module on a phone routinely passes 5s
    // and surfaced as "the parent shell did not answer" while the parent was
    // answering fine. Worse, the abandoned fetch keeps consuming bandwidth, so
    // the 800ms retry raced the download it was meant to replace. The parent
    // now acks on receipt: the liveness deadline covers only the ack, and the
    // bytes get a transfer-sized budget once we know someone is working on it.
    const MODULE_ACK_TIMEOUT_MS = 5000;
    const MODULE_TRANSFER_TIMEOUT_MS = 60000;

    function requestModuleBytes(retry) {
      const requestId = `module:${Date.now().toString(36)}:${++nextModuleRequest}`;
      return new Promise((resolve, reject) => {
        const pending = { resolve, reject, timer: null, acked: false };
        const failWith = (message) => {
          pendingModuleRequests.delete(requestId);
          const error = new Error(message);
          error.code = 'network';
          reject(error);
        };
        pending.timer = setTimeout(
          () => failWith('The parent shell did not answer the module request.'),
          MODULE_ACK_TIMEOUT_MS,
        );
        pending.onAck = () => {
          if (pending.acked) return;
          pending.acked = true;
          clearTimeout(pending.timer);
          pending.timer = setTimeout(
            () => failWith('The app module download timed out.'),
            MODULE_TRANSFER_TIMEOUT_MS,
          );
        };
        pendingModuleRequests.set(requestId, pending);
        try {
          window.parent.postMessage({
            type: 'moebius:module-request', requestId,
            appId: _FRAME_APP_ID, retry: retry === 1 ? 1 : 0,
          }, window.location.origin);
        } catch (error) {
          clearTimeout(pending.timer);
          pendingModuleRequests.delete(requestId);
          reject(error);
        }
      });
    }

    async function importBrokeredModule(retry) {
      const bytes = await requestModuleBytes(retry);
      const blob = new Blob([bytes], { type: 'text/javascript' });
      const blobUrl = URL.createObjectURL(blob);
      try {
        return await import(blobUrl);
      } finally {
        URL.revokeObjectURL(blobUrl);
      }
    }

    function isBlobModuleLoadFailure(error) {
      // Chromium and Firefox surface a transient failure to consume an
      // object URL as a TypeError. Match the browser's dynamic-import wording
      // and the blob: target together so an app's own TypeError is never
      // mistaken for a transport failure and evaluated a second time.
      if (!error || error.name !== 'TypeError') return false;
      return /(?:failed to fetch|error loading) dynamically imported module:\s*blob:/i
        .test(String(error.message || ''));
    }

    function acceptModuleAck(msg) {
      const pending = pendingModuleRequests.get(msg.requestId);
      if (!pending) return;
      pending.onAck();
    }

    function acceptModuleResult(msg) {
      const pending = pendingModuleRequests.get(msg.requestId);
      if (!pending) return;
      pendingModuleRequests.delete(msg.requestId);
      clearTimeout(pending.timer);
      if (msg.ok === true && msg.bytes instanceof ArrayBuffer) {
        pending.resolve(msg.bytes);
        return;
      }
      const error = new Error(
        msg.error && typeof msg.error.message === 'string'
          ? msg.error.message
          : 'The app module could not be loaded.'
      );
      error.code = msg.error && msg.error.code;
      error.status = msg.error && msg.error.status;
      pending.reject(error);
    }

    function rememberGestureScrollers(event) {
      gestureScrollers.clear();
      if (document.scrollingElement) gestureScrollers.add(document.scrollingElement);
      const path = typeof event.composedPath === 'function' ? event.composedPath() : [];
      for (const node of path) {
        if (!(node instanceof Element)) continue;
        if (node.scrollHeight > node.clientHeight || node.scrollWidth > node.clientWidth) {
          gestureScrollers.add(node);
        }
      }
    }

    function notifyParentFocus() {
      window.parent.postMessage({ type: 'moebius:frame-focus' }, window.location.origin);
    }

    function cancelScrollerMomentum(element) {
      if (!element) return;
      const left = element.scrollLeft;
      const top = element.scrollTop;
      const maxLeft = Math.max(0, element.scrollWidth - element.clientWidth);
      const maxTop = Math.max(0, element.scrollHeight - element.clientHeight);
      // Android's compositor fling is not cancelled by inert or
      // pointer-events:none, and assigning the SAME scroll offset is a no-op.
      // A reversible one-pixel nudge is the smallest synchronous scroll that
      // cancels it while leaving the app at the exact offset the owner saw.
      if (maxTop > 0) {
        element.scrollTop = top < maxTop ? top + 1 : Math.max(0, top - 1);
        element.scrollTop = top;
      } else if (maxLeft > 0) {
        element.scrollLeft = left < maxLeft ? left + 1 : Math.max(0, left - 1);
        element.scrollLeft = left;
      }
    }

    function stopSuspendedScrollHold() {
      if (suspendedScrollFrame !== null) cancelAnimationFrame(suspendedScrollFrame);
      suspendedScrollFrame = null;
      suspendedScrollOffsets.clear();
    }

    function holdSuspendedScroll() {
      for (const [element, offset] of suspendedScrollOffsets) {
        element.scrollLeft = offset.left;
        element.scrollTop = offset.top;
      }
      suspendedScrollFrame = requestAnimationFrame(holdSuspendedScroll);
    }

    function setFrameInteractivity(interactive, suspendScrolling) {
      document.documentElement.toggleAttribute('data-mobius-frame-suspended', !interactive);
      stopSuspendedScrollHold();
      if (interactive || !suspendScrolling) return;
      if (document.scrollingElement) gestureScrollers.add(document.scrollingElement);
      for (const scroller of gestureScrollers) {
        cancelScrollerMomentum(scroller);
        suspendedScrollOffsets.set(scroller, {
          left: scroller.scrollLeft,
          top: scroller.scrollTop,
        });
      }
      // A single DOM scroll can still lose a race with Android's compositor.
      // Hold the exact offset for the lifetime of the drawer, then release it
      // when the frame becomes interactive again. This also prevents an app's
      // own timer from moving its background while the modal surface is open.
      if (suspendedScrollOffsets.size > 0) holdSuspendedScroll();
    }

    document.addEventListener('touchstart', rememberGestureScrollers, { capture: true, passive: true });
    document.addEventListener('pointerdown', rememberGestureScrollers, { capture: true, passive: true });
    document.addEventListener('pointerdown', notifyParentFocus, { capture: true, passive: true });
    document.addEventListener('wheel', rememberGestureScrollers, { capture: true, passive: true });

    function renderMountedComponent() {
      if (!mountedRoot || !mountedComponent || !currentToken) return;
      mountedRoot.render(
        createElement(Fragment, null,
          createElement(MountSignal),
          createElement(mountedComponent, { appId: _FRAME_APP_ID, token: currentToken })
        )
      );
    }

    function tokenExpiresSoon(token, skewMs = 60000) {
      try {
        const encoded = String(token || '').split('.')[1];
        if (!encoded) return true;
        const normalized = encoded.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(atob(normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=')));
        return !Number.isFinite(payload.exp) || payload.exp * 1000 <= Date.now() + skewMs;
      } catch (_) {
        return true;
      }
    }

    function tokenAppInstanceId(token) {
      try {
        const encoded = String(token || '').split('.')[1];
        if (!encoded) return null;
        const normalized = encoded.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(atob(normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=')));
        return typeof payload.app_nonce === 'string' ? payload.app_nonce : null;
      } catch (_) {
        return null;
      }
    }

    function acceptToken(token) {
      if (!token) return;
      currentToken = token;
      _reportToken = token;
      // Preserve component state while keeping the legacy token prop aligned
      // with the refreshable window.mobius credential.
      renderMountedComponent();
      if (tokenRefreshResolve) tokenRefreshResolve(token);
      tokenRefreshResolve = null;
      tokenRefreshPromise = null;
    }

    function requestFreshToken() {
      if (tokenRefreshPromise) return tokenRefreshPromise;
      tokenRefreshPromise = new Promise(function (resolve) {
        tokenRefreshResolve = resolve;
        window.parent.postMessage(
          { type: 'moebius:token-expired', appId: _FRAME_APP_ID },
          window.location.origin
        );
        setTimeout(function () {
          if (tokenRefreshResolve !== resolve) return;
          tokenRefreshResolve = null;
          tokenRefreshPromise = null;
          resolve(currentToken);
        }, 10000);
      });
      return tokenRefreshPromise;
    }

    async function runtimeToken(options) {
      const forceRefresh = options && options.forceRefresh === true;
      if (!forceRefresh && currentToken && !tokenExpiresSoon(currentToken)) return currentToken;
      return requestFreshToken();
    }

    // Flips the post-mount error guard (handleFrameError above) AND tells the
    // parent the app is mounted. Rendered as the FIRST sibling of the app
    // component, so its passive effect is the first thing React runs after
    // COMMITTING the initial render — i.e. the app's DOM is actually on
    // screen. A component that throws DURING its first render aborts the
    // commit, this effect never runs, and the error panel still shows (the
    // pre-mount path). A throw in the app's own mount effects happens with
    // committed, visible DOM, so counting it as post-mount (suppressed +
    // logged) is correct.
    //
    // frame-mounted MUST be posted here and not after createRoot().render()
    // in loadModule: render() only SCHEDULES the first render, so posting
    // there claims "mounted" for a component that may still throw during
    // that render. The parent's double-buffered swap (AppCanvas) PROMOTES
    // the new frame and unmounts the old working one on this signal — a
    // premature post would swap in a frame whose commit then aborts,
    // stranding the owner on an error panel with the working frame already
    // gone. Posting at commit makes "mounted" mean visible DOM for both the
    // parent's overlay and the swap.
    function MountSignal() {
      useEffect(() => {
        window.__frameMounted = true;
        window.parent.postMessage(
          { type: 'moebius:frame-mounted', appId: _FRAME_APP_ID },
          window.location.origin
        );
      }, []);
      return null;
    }

    // Immersive safe-area passthrough. env(safe-area-inset-*) reads 0 inside
    // this sandboxed iframe (only the top-level document resolves
    // viewport-fit insets), so the parent shell reads the device's real
    // insets off a probe element and posts them. We expose them as
    // --mobius-safe-{top,right,bottom,left} on :root; an immersive app pads
    // with these instead of env(). The parent posts zeros whenever the app is
    // NOT immersive (its chrome owns the inset padding then), so apps can
    // unconditionally reference the vars and get 0 when windowed. Documented
    // for app authors in the building-apps skill.
    function applyInsets(insets) {
      if (!insets || typeof insets !== 'object') return;
      var root = document.documentElement.style;
      root.setProperty('--mobius-safe-top', insets.top || '0px');
      root.setProperty('--mobius-safe-right', insets.right || '0px');
      root.setProperty('--mobius-safe-bottom', insets.bottom || '0px');
      root.setProperty('--mobius-safe-left', insets.left || '0px');
    }

    // applyTheme mirrors the shell's src/lib/applyTheme.js so the iframe and
    // the shell paint a live theme swap identically. The frame can't import
    // the library (it's a raw inline bootstrap with no static imports), so the
    // logic is inlined; the pre-paint IIFE in <head> (PREPAINT_SRC) is the
    // shared first-paint half, and this is the postMessage live-swap half.
    //
    // Mode: from the bg's --bg luminance (bg arg first, then parsed out of
    // the CSS). Mirrors applyTheme.js inferMode. Returns null if no hex
    // resolves, so a css-only swap with no bg keeps the current mode.
    function inferMode(css, bg) {
      var hex = (typeof bg === 'string' && /^#[0-9a-fA-F]{3,8}$/.test(bg)) ? bg : null;
      if (!hex && typeof css === 'string') {
        var m = css.match(/--bg:\s*(#[0-9a-fA-F]{3,8})/);
        if (m) hex = m[1];
      }
      if (!hex) return null;
      var raw = hex.slice(1);
      var x = raw.length === 3 || raw.length === 4
        ? raw.slice(0, 3).replace(/(.)/g, '$1$1')
        : raw.slice(0, 6);
      var r = parseInt(x.slice(0, 2), 16);
      var g = parseInt(x.slice(2, 4), 16);
      var b = parseInt(x.slice(4, 6), 16);
      if (r !== r || g !== g || b !== b) return null;
      return (r + g + b) / 3 < 128 ? 'dark' : 'light';
    }

    // bg is re-validated as hex here (mirrors applyTheme.js HEX_RE) so a future
    // upstream change can't slip a CSS expression into body.style.background or
    // --bg; the @import stripping mirrors the library's allowlist so a
    // javascript:/data: @import in a live swap never becomes active CSS.
    var HEX = /^#[0-9a-fA-F]{3,8}$/;
    function applyTheme(css, bg) {
      if (typeof css === 'string' && css.length) {
        // Same @import allowlist as applyTheme.js + the pre-paint IIFE: strip
        // @import url('X'); out of the body and re-inject only the http(s)
        // ones as <link data-theme-font> (a javascript:/data: URL must not
        // become active CSS). Remove prior font links first so a swap doesn't
        // stack stale ones.
        var links = document.querySelectorAll('link[data-theme-font]');
        for (var li = 0; li < links.length; li++) links[li].remove();
        var fontUrls = [];
        // Cover all four @import spellings (quoted url(), bare url(), and
        // no-url() "X"/'X') so the http(s) allowlist below can't be bypassed
        // by a syntax the quoted-url-only regex didn't see — same broadened
        // pattern as applyTheme.js + the pre-paint IIFE.
        css = css.replace(
          /@import\s+(?:url\(\s*(?:"([^"]*)"|'([^']*)'|([^"'()\s]+))\s*\)|"([^"]*)"|'([^']*)')\s*;[^\S\n]*\n?/g,
          function (m, u1, u2, u3, q1, q2) {
            fontUrls.push(u1 !== undefined ? u1 : u2 !== undefined ? u2 : u3 !== undefined ? u3 : q1 !== undefined ? q1 : q2);
            return '';
          }
        );
        for (var fi = 0; fi < fontUrls.length; fi++) {
          if (/^https?:\/\//i.test(fontUrls[fi])) {
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = fontUrls[fi];
            link.setAttribute('data-theme-font', '1');
            document.head.appendChild(link);
          }
        }
        // Reuse the SAME style id the pre-paint IIFE wrote ('mobius-theme'),
        // so a live swap REPLACES the pre-painted block instead of stacking a
        // second one. (The id was 'moebius-theme' before theme-as-data; the
        // pre-paint script now owns 'mobius-theme', so they must agree.)
        let el = document.getElementById('mobius-theme');
        if (!el) {
          el = document.createElement('style');
          el.id = 'mobius-theme';
          document.head.appendChild(el);
        }
        el.textContent = css;
      }
      if (typeof bg === 'string' && HEX.test(bg)) {
        document.body.style.background = bg;
        document.documentElement.style.setProperty('--bg', bg);
      }
      // Keep <html data-theme> + color-scheme in sync on every live swap, not
      // just first paint. apps-sdk-ui scopes its tokens under
      // :where([data-theme="dark"|"light"]); without flipping data-theme an
      // app mounted dark that receives a light swap keeps the wrong-mode SDK
      // tokens. color-scheme drives UA-native widgets (scrollbars, form
      // controls) — both mirror applyTheme.js.
      var mode = inferMode(css, bg);
      if (mode) {
        document.documentElement.setAttribute('data-theme', mode);
        document.documentElement.style.colorScheme = mode;
      }
    }

    // Report uncaught APP errors to the activity log so the nightly Reflection
    // digest sees them. These fire in THIS iframe's window, not the shell's,
    // so the shell's errorLog can't catch them. POSTs with the app token ->
    // app_error attributed to this app_id. Client-side debounce mirrors the
    // server's so a render loop can't storm the network.
    let _reportToken = null;
    const _reportSeen = new Map();
    function reportAppError(where, message, stack) {
      if (!_reportToken || !message) return;
      const key = String(message).slice(0, 200);
      const now = Date.now();
      const last = _reportSeen.get(key);
      if (last && now - last < 60000) return;
      _reportSeen.set(key, now);
      const body = JSON.stringify({
        message: String(message).slice(0, 2000),
        where: where,
        stack: stack ? String(stack).slice(0, 8000) : undefined,
        url: location.href,
      });
      runtimeToken().then(function (token) {
        return fetch('/api/client-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: body,
          keepalive: true,
        }).then(function (response) {
          if (response.status !== 401) return;
          return runtimeToken({ forceRefresh: true }).then(function (fresh) {
            if (!fresh || fresh === token) return;
            return fetch('/api/client-error', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + fresh },
              body: body,
              keepalive: true,
            });
          });
        });
      }).catch(function () {});
    }
    window.addEventListener('error', function (e) {
      if (!e.error && !e.message) return;
      reportAppError('app:window.onerror', e.message, e.error && e.error.stack);
    });
    window.addEventListener('unhandledrejection', function (e) {
      const r = e.reason;
      reportAppError('app:unhandledrejection', (r && r.message) || String(r), r && r.stack);
    });

    async function loadModule() {
      const token = currentToken;
      if (!token) {
        showErr('Configuration error', 'No token received from parent.');
        return;
      }
      try {
        // The compiler injects React, the mounting bridge, mobius-runtime, and
        // every library the app imports into ONE self-contained module. Seed
        // its runtime config before evaluation so even app top-level code sees
        // window.mobius; the opaque frame performs no network module imports.
        globalThis.__mobiusRuntimeConfig = {
          appId: _FRAME_APP_ID,
          appInstanceId: tokenAppInstanceId(currentToken),
          getToken: runtimeToken,
          capabilityContract: currentCapabilityContract,
        };
        // Opaque sandboxed frames are intentionally NOT controlled by the
        // shell's service worker. Loading /module directly from here therefore
        // misses CacheStorage offline even though the frame document itself was
        // served from it. Ask the exact source-attributing parent to perform the
        // authenticated, versioned fetch and transfer the bytes instead.
        //
        // Blob execution preserves the opaque-origin boundary. The compiler
        // bundles the complete source + runtime graph, so no relative or bare
        // imports are tied to the temporary blob URL. Revoke it immediately
        // after evaluation to avoid retaining compiled source in this realm.
        const IMPORT_RETRY_DELAY_MS = 800;
        let mod;
        try {
          mod = await importBrokeredModule(0);
        } catch (importErr) {
          if (importErr && importErr.code === 'token-expired') {
            // Tell the parent shell the token is expired. AppCanvas listens
            // for this, invalidates the app-token query, waits for a fresh token,
            // and re-sends moebius:frame-init with the new value. The initialized
            // flag is reset here so the listener will accept the re-init.
            initialized = false;
            window.parent.postMessage(
              { type: 'moebius:token-expired', appId: _FRAME_APP_ID },
              window.location.origin
            );
            return;  // do NOT show the error panel — the re-init will retry
          }
          // Mobile networks routinely drop the first fetch after wake. Browsers
          // can also transiently reject the fresh blob URL while consuming the
          // transferred bytes. Retry only those two transport-shaped failures;
          // all app evaluation errors remain deterministic and go straight to
          // the error surface. The retry marker reaches the parent's versioned
          // fetch and is stripped from the service-worker cache key.
          const retryable = Boolean(importErr && importErr.code === 'network')
            || isBlobModuleLoadFailure(importErr);
          if (!retryable || window.__frameMounted) {
            throw importErr;
          }
          await new Promise((r) => setTimeout(r, IMPORT_RETRY_DELAY_MS));
          try {
            mod = await importBrokeredModule(1);
          } catch (retryErr) {
            if (retryErr && retryErr.code === 'token-expired') {
              initialized = false;
              window.parent.postMessage(
                { type: 'moebius:token-expired', appId: _FRAME_APP_ID },
                window.location.origin
              );
              return;
            }
            throw retryErr;
          }
        }
        const compiledRuntime = globalThis.__mobiusCompiledRuntime;
        if (!compiledRuntime ||
            compiledRuntime.abi !== COMPILED_RUNTIME_ABI ||
            typeof compiledRuntime.createRoot !== 'function' ||
            typeof compiledRuntime.createElement !== 'function' ||
            typeof compiledRuntime.useEffect !== 'function') {
          throw new Error('The app bundle is missing the compiled runtime.');
        }
        createRoot = compiledRuntime.createRoot;
        createElement = compiledRuntime.createElement;
        Fragment = compiledRuntime.Fragment;
        useEffect = compiledRuntime.useEffect;
        const Component = mod.default;
        if (!Component) {
          showErr('Module error', 'The app module has no default export.');
          return;
        }
        mountedRoot = createRoot(document.getElementById('root'));
        mountedComponent = Component;
        renderMountedComponent();
        // frame-mounted is posted by MountSignal's passive effect (above),
        // which runs only after React COMMITS this first render. Posting
        // here would be premature: render() has merely been scheduled, and
        // a component that throws during its first render would have
        // already claimed "mounted" — the parent's double-buffered swap
        // would promote a dead frame on that lie. See MountSignal.
      } catch (err) {
        showErr('Failed to load app', err.stack || err.message);
      } finally {
        delete globalThis.__mobiusRuntimeConfig;
      }
    }

    window.addEventListener('message', (e) => {
      if (e.source !== window.parent || e.origin !== window.location.origin) return;
      const msg = e.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'moebius:module-ack' &&
          String(msg.appId) === String(_FRAME_APP_ID)) {
        acceptModuleAck(msg);
        return;
      }
      if (msg.type === 'moebius:module-result' &&
          String(msg.appId) === String(_FRAME_APP_ID)) {
        acceptModuleResult(msg);
        return;
      }
      if (msg.type === 'moebius:frame-theme') {
        applyTheme(msg.themeCss, msg.bg);
        return;
      }
      if (msg.type === 'moebius:frame-insets') {
        applyInsets(msg.insets);
        return;
      }
      if (msg.type === 'moebius:frame-interactivity') {
        setFrameInteractivity(msg.interactive === true, msg.suspendScrolling === true);
        return;
      }
      if (msg.type === 'moebius:storage-sync') {
        if (typeof window.__mobiusSyncLocalStorage === 'function') {
          window.__mobiusSyncLocalStorage(msg.key, msg.value);
        }
        return;
      }
      if (msg.type === 'moebius:storage-dead-letter') {
        try {
          window.mobius && window.mobius.storage &&
            window.mobius.storage._receiveDeadLetter(msg.payload);
        } catch (e) {}
        return;
      }
      if (msg.type === 'moebius:frame-init') {
        currentCapabilityContract = msg.capabilityContract || null;
        acceptToken(msg.token);
        if (initialized) return;
        initialized = true;
        if (typeof window.__mobiusHydrateLocalStorage === 'function') {
          window.__mobiusHydrateLocalStorage(msg.storage);
        }
        applyTheme(msg.themeCss, msg.bg);
        loadModule();
      }
    });

    // No ready/retry handshake. The parent (AppCanvas) drives init
    // off the iframe's `onLoad` event, which by spec fires AFTER all
    // module scripts in this document have executed and registered
    // their message listeners. By then this listener is guaranteed
    // to be live, so a single postMessage from the parent reaches
    // it without a race. If we never get init within 10s the iframe
    // was opened standalone (not inside Möbius) — show an error.
    setTimeout(() => {
      if (!initialized) {
        showErr('Loading timeout', 'No init message from parent shell.');
      }
    }, 10000);
  </script>
</body>
</html>
