services:
  app:
    # container_name and image are GLOBAL (not Compose-project-scoped), so two
    # runs with the same defaults collide even when -p differs. For full
    # isolation set MOBIUS_CONTAINER and MOBIUS_IMAGE in addition to -p:
    #   MOBIUS_CONTAINER=mobius-test-foo MOBIUS_IMAGE=mobius-test-foo:ci \
    #     docker compose -p mobius-test-foo -f docker-compose.test.yml ...
    # The volume is already project-scoped (<project>_test_data) and needs
    # no override — only container_name + image are global.
    image: ${MOBIUS_IMAGE:-mobius-test:ci}
    build: .
    container_name: ${MOBIUS_CONTAINER:-mobius-test}
    init: true
    # `unless-stopped` so the recovery chat's Restart button works in
    # test: SIGTERMing uvicorn relies on Docker bringing the container
    # back up. With `restart: "no"` the recovery flow bricks the test
    # container exactly where we exercise it.
    restart: unless-stopped
    environment:
      # Pin a fixed test SECRET_KEY so the test container never inherits a
      # prod-shaped value from the host shell. Do NOT use this value anywhere
      # other than mobius-test.
      - SECRET_KEY=test-secret-not-for-prod-do-not-use-anywhere-else
      - DOMAIN=localhost
      - FRONTEND_ORIGIN=http://localhost:8001
      - DATABASE_URL=sqlite:////data/db/ultimate.db
      - DATA_DIR=/data
      - AGENT_BROWSER_STREAM_PORT=9225
    volumes:
      - test_data:/data
    # To use a custom port without merge-appending the default, you MUST use
    # the !override tag — a plain second `ports:` entry adds to this list and
    # leaves the default 8001:8000 binding colliding with the original run:
    #   ports: !override ["${TEST_PORT:-8001}:8000"]
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  pytest:
    image: ${MOBIUS_IMAGE:-mobius-test:ci}
    profiles: ["test"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      # describe-tree.py + entrypoint + register_app are imported by
      # tests; mount the live scripts dir so renames/new scripts are
      # picked up without rebuilding the image.
      - ./backend/scripts:/app/scripts
      - ./frontend/public/app-frame.html:/app/app-frame.html
    environment:
      - SECRET_KEY=test-secret-key-at-least-32-characters-long
      - DATABASE_URL=sqlite:////tmp/test.db
      - DATA_DIR=/tmp/testdata
      - FRONTEND_ORIGIN=http://localhost:5173
      # Bootstrap fetches the curated store manifest from GitHub on
      # first boot. Tests must not depend on outbound network — set
      # this so ensure_store_installed() returns immediately.
      - MOEBIUS_SKIP_BOOTSTRAP=1
    working_dir: /app
    entrypoint: ["python", "-m", "pytest", "tests/", "-v"]

volumes:
  test_data:
