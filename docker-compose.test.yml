services:
  app:
    # container_name and image are GLOBAL (not Compose-project-scoped), so two
    # runs with the same defaults collide even when -p differs. For full
    # isolation set MOBIUS_CONTAINER and MOBIUS_IMAGE in addition to -p:
    #   MOBIUS_CONTAINER=mobius-test-foo MOBIUS_IMAGE=mobius-test-foo:ci \
    #     docker compose -p mobius-test-foo -f docker-compose.test.yml ...
    # The volume is already project-scoped (<project>_test_data) and needs
    # no override — only container_name + image are global.
    image: ${MOBIUS_IMAGE:-mobius-test:ci}
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: ${MOBIUS_CONTAINER:-mobius-test}
    init: true
    # `unless-stopped` so the recovery chat's Restart button works in
    # test: SIGTERMing uvicorn relies on Docker bringing the container
    # back up. With `restart: "no"` the recovery flow bricks the test
    # container exactly where we exercise it.
    restart: unless-stopped
    # Match production's nested-bwrap boundary so live container tests exercise
    # the real background-agent sandbox rather than skipping on Docker's default
    # namespace restrictions. These grants apply only to the app service.
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    environment:
      # Pin a fixed test SECRET_KEY so the test container never inherits a
      # prod-shaped value from the host shell. Do NOT use this value anywhere
      # other than mobius-test.
      - SECRET_KEY=test-secret-not-for-prod-do-not-use-anywhere-else
      - DOMAIN=localhost
      - FRONTEND_ORIGIN=http://localhost:8001
      - DATABASE_URL=sqlite:////data/db/ultimate.db
      - DATA_DIR=/data
      - AGENT_BROWSER_STREAM_PORT=9225
    volumes:
      - test_data:/data
    # Port is TEST_PORT (default 8001). Uses the !override tag so a custom
    # TEST_PORT REPLACES the default rather than merge-appending it (a plain
    # second `ports:` entry would keep 8001:8000 AND add the new one, colliding
    # with a concurrent default run).
    ports: !override ["${TEST_PORT:-8001}:8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Frozen recovery floor — a SEPARATE container from the same image, so a
  # broken/crash-looping platform can't take it down. Runs recoveryd (stdlib
  # http.server, zero app.* imports) on :8001. Mounts the SAME test_data
  # volume so it can write /data/.recover-pending + the restart sentinel that
  # the platform's entrypoint poller acts on. Exposed on a host port for the
  # mobius-test rehearsal (prod routes /recover* via the external Caddy, which
  # is the owner's cutover step — not wired here).
  recoveryd:
    image: ${MOBIUS_IMAGE:-mobius-test:ci}
    container_name: ${MOBIUS_RECOVERYD_CONTAINER:-mobius-test-recoveryd}
    init: true
    restart: unless-stopped
    # GUARDRAIL (mirrors docker-compose.yml): read-only rootfs so the full-root
    # recovery agent gets EROFS writing recovery's own code (/app/recovery) —
    # writable surfaces are the /data + /recovery-live volumes + tmpfs scratch.
    read_only: true
    # Drop CAP_SYS_ADMIN so a full-root agent can't remount the
    # read-only recovery floor back to writable — makes the lockdown airtight.
    cap_drop:
      - SYS_ADMIN
    tmpfs:
      - /tmp
      - /run
    command: ["python3", "-P", "/app/recovery/recoveryd.py"]
    environment:
      - DATA_DIR=/data
      - HOME=/tmp
      - DATABASE_URL=sqlite:////data/db/ultimate.db
      - RECOVERY_PORT=8001
      # Root of recoveryd's PRIVATE live-copy store (the recovery_live volume
      # below), kept OFF the shared /data volume — see the volume comment.
      - RECOVERY_LIVE_ROOT=/recovery-live
      # The platform service is reachable as `app` on the compose network.
      - RECOVERY_PLATFORM_HEALTH_URL=http://app:8000/api/health
    volumes:
      # nocopy is load-bearing. recoveryd shares the SAME fresh test_data
      # volume as `app`, and the image bakes /data/db etc. (Dockerfile:304),
      # so on a fresh volume BOTH containers would trigger Docker's
      # image->volume copy-up. Two concurrent copy-ups race on `mkdir
      # _data/db` -> "file exists", and whichever loses fails to create —
      # the intermittent e2e "Start test container" flake. nocopy makes
      # recoveryd skip copy-up entirely, so only `app` populates the volume:
      # one mkdir, no race. Safe because recoveryd needs no /data content at
      # boot (main() only asserts its frozen /app/recovery bundle, then
      # serves; it touches /data lazily per recovery request, after `app` has
      # populated it). This also keeps the recovery floor independent of app
      # startup — no depends_on coupling, which the "survives a broken
      # platform" design relies on.
      - test_data:/data:nocopy
      # recoveryd's PRIVATE live-copy store, mounted into THIS service ONLY —
      # the `app` (agent) container never mounts it. Keeping the pulled live
      # recovery off the agent-writable /data volume is what makes it
      # un-swappable by the agent (closes the root-escalation TOCTOU). Do NOT
      # add this mount to the `app` service.
      - recovery_live:/recovery-live
    ports: !override ["${RECOVERY_TEST_PORT:-8011}:8001"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/recover/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  pytest:
    image: ${MOBIUS_IMAGE:-mobius-test:ci}
    profiles: ["test"]
    volumes:
      # Mount one coherent checkout at a non-runtime path and run exactly like
      # CI (`cd backend && pytest`). Mounting only app/tests/scripts at /app
      # mixed live tests with baked recovery, frontend, root scripts, and build
      # metadata from another revision; repo-root tests then resolved `/` and
      # produced a large false-failure cluster.
      - ./:/workspace
    tmpfs:
      # The baked runtime vendor tree is not part of a source-checkout CI run.
      # Mask it so frontend watcher tests compare only their fixture builds.
      - /app/static/vendor
    environment:
      - SECRET_KEY=test-secret-key-at-least-32-characters-long
      - DATABASE_URL=sqlite:////tmp/test.db
      - DATA_DIR=/tmp/testdata
      - FRONTEND_ORIGIN=http://localhost:5173
      - MOBIUS_BUILD_INFO_PATH=/workspace/.test-build-info-does-not-exist.json
      # This may be a linked git worktree whose .git file points to a host-only
      # common dir. Tests create and query explicit temporary repos; prevent an
      # unrelated `git ls-remote` from failing while discovering the broken
      # outer worktree pointer first.
      - GIT_CEILING_DIRECTORIES=/workspace
      # Bootstrap fetches the curated store manifest from GitHub on
      # first boot. Tests must not depend on outbound network — set
      # this so ensure_store_installed() returns immediately.
      - MOEBIUS_SKIP_BOOTSTRAP=1
    working_dir: /workspace/backend
    entrypoint: ["python", "-m", "pytest", "tests/", "-v"]

volumes:
  test_data:
  # recoveryd's private live-copy store — mounted into the recoveryd service
  # ONLY (never `app`), so the pulled live recovery stays off the
  # agent-writable /data volume (root-escalation TOCTOU close).
  recovery_live:
