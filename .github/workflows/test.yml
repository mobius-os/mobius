name: Tests

on:
  push:
    # All long-lived branches get CI on push, not just main. Today's
    # session shipped three commits to integration/ux-recovery-mod
    # that would have broken three frontend tests if main-only CI
    # had been the gate — instead the breakage was found ~10 hours
    # later during a manual mobius-test rebuild. CI minutes are
    # cheap; finding regressions early is not.
    branches: [main, 'integration/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install esbuild
        # compile_jsx shells out to esbuild; /api/apps/ tests need it.
        # Keep the version aligned with Dockerfile's pin.
        run: npm install -g esbuild@0.20.2
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend-unit:
    # Wires up the node:test unit suite that lives under
    # frontend/src/**/__tests__/. Two loaders are needed: vite-env-loader
    # rewrites import.meta.env.* literals for lib/utils tests; react-loader
    # aliases bare `react` imports to a hook-only shim for ChatView hook
    # tests. They can't run as one step because the hook shim doesn't
    # implement React.createContext (which TanStack Query needs transitively).
    # Previously these tests were documented as run-by-hand and silently
    # rotted — drift in themeService.js + DOM-stub gaps cascaded for ~5
    # days before anyone noticed. CI guards that gap.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mobius-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test container
        run: |
          # Image is already built and loaded above — compose uses it.
          docker compose -p mobius-test -f docker-compose.test.yml up -d --no-build
          echo "Waiting for container to be healthy..."
          timeout 120 bash -c '
            until docker inspect --format="{{.State.Health.Status}}" mobius-test 2>/dev/null | grep -q healthy; do
              sleep 3
            done
          '
          echo "Container is healthy"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test
        env:
          CI: '1'
          MOBIUS_URL: http://localhost:8001
          MOBIUS_USER: admin
          MOBIUS_PASS: admin

      - name: Container logs (on failure)
        if: failure()
        run: docker logs mobius-test --tail 200

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Playwright test-results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: warn

      - name: Stop test container
        if: always()
        run: docker compose -p mobius-test -f docker-compose.test.yml down -v
