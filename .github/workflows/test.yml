name: Tests

on:
  push:
    # Cheap checks run on development branches too. The e2e job below narrows
    # its own execution to PRs and long-lived branches, avoiding a duplicate
    # full browser run for both a feature push and its PR event.
    branches: [main, 'integration/**', 'feat/**', 'fix/**']
  pull_request:
    # True PR stacks target the upstream branch directly beneath them. Run the
    # same suite for every layer so the chain is reviewable in parallel; main's
    # strict required checks still decide when each retargeted layer can merge.
    branches: [main, 'stack/**']

# Cancel an in-flight run when a newer commit lands on the same ref.
# Several agents push to main in bursts. cancel-in-progress is scoped to
# pull_request events: a superseded PR commit gets cancelled (no point
# testing a force-pushed-over commit), but pushes to main QUEUE and each
# completes — so main always gets a real per-commit e2e signal instead of
# being starved when the next push lands mid-run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  privacy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Reject private workspace paths
        run: scripts/check-private-paths.sh
      - name: Test local privacy gates
        run: scripts/test-git-privacy-gates.sh

  backend:
    runs-on: ubuntu-latest
    # The full backend suite is now large enough that cold hosted runners can
    # reach 5 minutes while tests are still passing. Keep the cap bounded, but
    # leave headroom so the job fails on assertions instead of a hard cancel.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install esbuild
        # compile_jsx shells out to esbuild; /api/apps/ tests need it.
        # Keep aligned with the Dockerfile pin (the source of truth) — drift
        # here means a 0.25-only compile regression passes green CI but
        # breaks the prod image build.
        run: npm install -g esbuild@0.25.12
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Install frontend validator deps
        # Backend publication tests execute the checked-in built-global
        # validator, whose parser/traversal dependencies live in this lockfile.
        working-directory: frontend
        run: npm ci
      - name: Validate bundled Caddy policy
        # Caddy expands these placeholders inside its container. Keep the
        # validation values non-empty and production-shaped so both site
        # blocks and the cross-origin CSP are actually parsed.
        run: >-
          docker run --rm
          -e DOMAIN=mobius.example.test
          -e FRONTEND_ORIGIN=https://mobius.example.test
          -e MOBIUS_SERVICE_TANDOOR_ORIGIN=https://tandoor.example.test
          -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.9-alpine
          caddy validate --config /etc/caddy/Caddyfile
      - name: Run pytest
        working-directory: backend
        run: pytest -q --durations=25

  frontend-unit:
    # Wires up the node:test unit suite that lives under
    # frontend/src/**/__tests__/. Two loaders are needed: vite-env-loader
    # rewrites import.meta.env.* literals for lib/utils tests; react-loader
    # aliases bare `react` imports to a hook-only shim for ChatView hook
    # tests. They can't run as one step because the hook shim doesn't
    # implement React.createContext (which TanStack Query needs transitively).
    # Previously these tests were documented as run-by-hand and silently
    # rotted — drift in themeService.js + DOM-stub gaps cascaded for ~5
    # days before anyone noticed. CI guards that gap.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node with npm cache
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        # Required because themeService.test.js transitively imports
        # @tanstack/react-query (via hooks/queries.js). Without
        # node_modules the loader can't resolve the bare specifier
        # and the whole test suite fails on ERR_MODULE_NOT_FOUND.
        working-directory: frontend
        run: npm ci
      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  packager-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Run static app packager tests
        run: npm run test:packager
      - name: Run browser harness unit tests
        run: npm run test:e2e-harness

  core-apps-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node with npm cache
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run core app unit tests
        run: npm run test:core-apps

  core-apps-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Check core-apps matches the pinned catalog
        run: scripts/check-core-apps-sync.sh

  e2e:
    # Full browser E2E is the comprehensive integration gate, not a per-push
    # development loop. Run it for reviewable PRs and long-lived branches;
    # feature/fix branch pushes still get the cheap jobs above without paying
    # twice before their PR check.
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/integration/')
    runs-on: ubuntu-latest
    # Building the Docker image can take several minutes on cold hosted
    # runners. Keep the job cap comfortably above the inner Playwright timeout
    # so failures still reach the diagnostic log/report upload steps.
    timeout-minutes: 25
    needs: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mobius-test:ci
          # The runtime seeds /data/platform from the image's baked clone and
          # its warm frontend watcher immediately builds from that checkout.
          # Pin the clone to this exact push/PR merge; leaving BUILD_SHA at its
          # `unknown` default silently seeds origin/main, so Playwright runs the
          # checked-out PR's tests against main's backend and rebuilt frontend.
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          # A transient GHA cache-service miss must not turn a successfully
          # built and loaded image into a red build. The image itself remains
          # authoritative; cache export is only a performance optimization.
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Start test container
        run: |
          # Image is already built and loaded above — compose uses it.
          docker compose -p mobius-test -f docker-compose.test.yml up -d --no-build
          echo "Waiting for container to be healthy..."
          timeout 120 bash -c '
            until docker inspect --format="{{.State.Health.Status}}" mobius-test 2>/dev/null | grep -q healthy; do
              sleep 3
            done
          '
          echo "Container is healthy"

          # Fail before Playwright if the running platform drifted from the
          # checkout under test. Checking both the baked identity and the
          # actively served clone prevents a future seed/fallback change from
          # reintroducing false-green or false-red PR checks.
          # Compose starts Caddy immediately after the app healthcheck turns
          # green. On a cold hosted runner, Caddy can accept the first TCP
          # connection while its upstream transport is still settling and
          # reset that one request. Treat public proxy readiness as its own
          # bounded gate instead of assuming app health makes the proxy
          # synchronously ready.
          version_file="$RUNNER_TEMP/mobius-test-version.json"
          identity_ready=0
          for _ in $(seq 1 30); do
            if curl -fsS --connect-timeout 2 --max-time 4 \
                 http://localhost:8001/api/version >"$version_file" 2>/dev/null \
               && python3 - "$version_file" <<'PY'
          import json, os, sys
          with open(sys.argv[1], encoding="utf-8") as handle:
              version = json.load(handle)
          expected = os.environ["GITHUB_SHA"]
          fields = ("sha", "served_sha", "platform_sha")
          wrong = {name: version.get(name) for name in fields if version.get(name) != expected}
          if wrong:
              raise SystemExit(f"runtime identity mismatch: expected {expected}; got {wrong}")
          PY
            then
              identity_ready=1
              break
            fi
            sleep 1
          done
          if [ "$identity_ready" != 1 ]; then
            echo "Public test proxy did not expose the expected runtime identity." >&2
            exit 1
          fi
          echo "Runtime identity matches checkout: $GITHUB_SHA"

      - name: Set up Node with npm cache
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install test deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        id: pw
        # Inner timeout BELOW the job's timeout-minutes (15) so a hang ends
        # as a captured failure, NOT a hard job cancel that skips the
        # diagnostics below. That skip is exactly why CI kept losing the
        # backend logs on the e2e hang — a cancelled job runs no further
        # steps. INT lets Playwright write its report before exiting; the
        # captured exit code is converted back to pass/fail at the end.
        run: |
          set +e
          # --kill-after sends SIGKILL 30s after the SIGINT if Playwright
          # ignores the interrupt, so the step can't hang past the cap.
          timeout --signal=INT --kill-after=30s 12m npx playwright test
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          CI: '1'
          MOBIUS_URL: http://localhost:8001
          MOBIUS_TEST_INTERNAL_API: http://localhost:8012
          MOBIUS_USER: admin
          MOBIUS_PASS: admin

      - name: Container logs
        if: always()
        run: docker logs mobius-test --tail 400 2>&1 || true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Report e2e result
        # If setup or image construction failed, preserve that real failure
        # instead of adding a misleading "playwright exit" error with an
        # empty output from a step that never ran.
        if: always() && steps.pw.outcome != 'skipped'
        env:
          PW_EXIT: ${{ steps.pw.outputs.exit }}
        run: |
          if [ "$PW_EXIT" = '124' ]; then
            echo "::error::e2e hit the inner 12m timeout — see the 'Container logs' step above and the playwright-report artifact for where it wedged."
            exit 1
          fi
          if [ "$PW_EXIT" != '0' ]; then
            echo "::error::e2e tests failed (playwright exit $PW_EXIT)."
            exit 1
          fi
          echo "e2e passed"

      - name: Upload Playwright test-results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: warn

      - name: Stop test container
        if: always()
        run: docker compose -p mobius-test -f docker-compose.test.yml down -v
