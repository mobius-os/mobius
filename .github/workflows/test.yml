name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install esbuild
        # compile_jsx shells out to esbuild; /api/apps/ tests need it.
        # Keep the version aligned with Dockerfile's pin.
        run: npm install -g esbuild@0.20.2
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mobius-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test container
        run: |
          # Image is already built and loaded above — compose uses it.
          docker compose -p mobius-test -f docker-compose.test.yml up -d --no-build
          echo "Waiting for container to be healthy..."
          timeout 120 bash -c '
            until docker inspect --format="{{.State.Health.Status}}" mobius-test 2>/dev/null | grep -q healthy; do
              sleep 3
            done
          '
          echo "Container is healthy"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test
        env:
          MOBIUS_URL: http://localhost:8001
          MOBIUS_USER: admin
          MOBIUS_PASS: admin

      - name: Container logs (on failure)
        if: failure()
        run: docker logs mobius-test --tail 100

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop test container
        if: always()
        run: docker compose -p mobius-test -f docker-compose.test.yml down -v
